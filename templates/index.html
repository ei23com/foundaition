// Simple markdown renderer (headings, bold, italic, links, lists, code)
    // ── Tabelle rendern (wird von renderMarkdownSimple aufgerufen) ─────────
    function renderTable(rows) {
        let html = '<table>\n<thead><tr>';
        // Header (erste Zeile)
        const hdrParts = rows[0].replace(/^\|/,'').replace(/\|$/,'').split('|');
        for (const c of hdrParts) {
            html += '<th>' + c.trim() + '</th>';
        }
        html += '</tr></thead>\n<tbody>\n';
        // Body (ab dritter Zeile, zweite ist Separator)
        for (let i = 2; i < rows.length; i++) {
            const parts = rows[i].replace(/^\|/,'').replace(/\|$/,'').split('|');
            html += '<tr>';
            for (const c of parts) {
                html += '<td>' + c.trim() + '</td>';
            }
            html += '</tr>\n';
        }
        html += '</tbody>\n</table>';
        return html;
    }

function renderMarkdownSimple(md) {
    // 1. Fenced code blocks zuerst extrahieren und als fertiges HTML speichern
    const codeBlocks = [];
    md = md.replace(/```(\w*)\n([\s\S]*?)```/g, function(match, lang, code) {
        const idx = codeBlocks.length;
        const escapedCode = esc(code.replace(/^\n|\n$/g, ''));
        const langAttr = lang ? ' class="language-' + esc(lang) + '"' : '';
        codeBlocks.push('<pre><code' + langAttr + '>' + escapedCode + '</code></pre>');
        // Platzhalter mit Unicode-GlYPH der nach esc() stabil bleibt
        return '\uffffCB' + idx + '\uffff';
    });

    // 2. HTML-Entities escapen (betrifft jetzt nur Text außerhalb von Codeblocks)
    let html = esc(md);

    // 3. Headings (höchste zuerst, damit ### vor ## geprüft wird)
    html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
    html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
    html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

    // 4. Bold & italic
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

    // 5. Inline code (nur außerhalb von Codeblocks)
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

    // 6. Links
    html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

    // 7. Unordered lists
    html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
    html = html.replace(/(<li>.*<\/li>\s*)+/g, '<ul>$&</ul>');

    // 8. Tables (Pipe-Tabelle Syntax)
    const tableLines = html.split('\n');
    const processed = [];
    let inTable = false;
    let tableBuf = [];
    for (let i = 0; i < tableLines.length; i++) {
        let line = tableLines[i];
        // Tabelle beginnt mit header row (mindestens ein Pipe)
        if (!inTable && line.trim().includes('|') && !line.trim().startsWith('-')) {
            // Nächste Zeile ist separator? → Table-Start
            if (i + 1 < tableLines.length && /^[ \t]*\|?[ \t]*([-:]+[ \t]*)+\|?$/.test(tableLines[i + 1].trim())) {
                inTable = true;
                tableBuf = [line.trim()];
                continue;
            }
        }
        // Separator-Zeile (zweite Zeile)
        if (inTable && tableBuf.length === 1 && /^[ \t]*\|?[ \t]*([-:]+[ \t]*)+\|?$/.test(line.trim())) {
            tableBuf.push(line.trim());
            continue;
        }
        // Data rows (mindestens ein Pipe, kein Separator-Pattern)
        if (inTable && line.trim().includes('|') && tableBuf.length >= 2 && !/^[ \t]*\|?[ \t]*([-:]+[ \t]*)+\|?$/.test(line.trim())) {
            tableBuf.push(line.trim());
            continue;
        }
        // Tabelle endet → rendern
        if (inTable) {
            processed.push(renderTable(tableBuf));
            inTable = false;
            tableBuf = [];
            processed.push(line);
        } else {
            processed.push(line);
        }
    }
    if (inTable && tableBuf.length > 0) {
        processed.push(renderTable(tableBuf));
    }
    html = processed.join('\n');

    // 8b. Paragraphs
    html = html.replace(/\n\n/g, '</p><p>');
    html = '<p>' + html + '</p>';

    // 9. Empty paragraphs säubern
    html = html.replace(/<p>\s*<\/p>/g, '');
    html = html.replace(/<p>(<h[1-6]>)/g, '$1');
    html = html.replace(/(<\/h[1-6]>)<\/p>/g, '$1');
    html = html.replace(/<p>(<ul>)/g, '$1');
    html = html.replace(/(<\/ul>)<\/p>/g, '$1');
    html = html.replace(/<p>(<pre>)/g, '$1');
    html = html.replace(/(<\/pre>)<\/p>/g, '$1');
    html = html.replace(/<p>(<table>)/g, '$1');
    html = html.replace(/(<\/table>)<\/p>/g, '$1');

    // 10. Extrahierte Codeblocks wieder einsetzen (Platzhalter ist jetzt als &#12748;CB... im escaped HTML)
    for (let i = 0; i < codeBlocks.length; i++) {
        const placeholder = '\uffffCB' + i + '\uffff';
        html = html.replace(new RegExp(placeholder, 'g'), codeBlocks[i]);
    }

    return html;
}

// ── Config Modal ─────────────────────────────────────────
const menuConfig  = document.getElementById('menuConfig');
const configOverlay = document.getElementById('configOverlay');
const configClose   = document.getElementById('configClose');
const configBody    = document.getElementById('configBody');
const configSaveBtn = document.getElementById('configSaveBtn');
const envInfo       = document.getElementById('envInfo');
let configData      = null; // aktuelle Config-Daten

const sectionLabels = {
    openai: '🤖 AI / OpenAI',
    whisper: '🎙️ Whisper',
    youtube: '▶️ YouTube',
    database: '🗄️ Database',
    general: '⚙️ General',
    categorize: '🏷️ Categorization',
    rss: '📡 RSS Feed',
    tools: '🛠️ Tools'
};

async function openConfig() {
    if (configOverlay) configOverlay.classList.add('open');
    hamburgerDropdown.classList.remove('open');
    try {
        const r = await fetch('/api/config');
        if (!r.ok) throw new Error('HTTP ' + r.status);
        configData = await r.json();
        renderConfig(configData);
    } catch (e) {
        configBody.innerHTML = '<p style="color:var(--text-secondary);">Fehler: ' + esc(e.message) + '</p>';
    }
}

function closeConfig() {
    if (configOverlay) configOverlay.classList.remove('open');
}

function renderConfig(data) {
    if (!data || !data.configured) {
        configBody.innerHTML = '<p style="color:var(--text-secondary);">Keine Konfiguration verfügbar.</p>';
        return;
    }

    envInfo.textContent = 'Datei: ' + (data.envFile || '.env') + (data.exists ? ' ✓' : ' (noch nicht angelegt)');

    // Nach Sektionen gruppieren
    const groups = {};
    for (const entry of data.configured) {
        const sec = entry.section || 'general';
        if (!groups[sec]) groups[sec] = [];
        groups[sec].push(entry);
    }

    let html = '';
    const sectionOrder = ['openai', 'whisper', 'youtube', 'database', 'general', 'categorize', 'rss', 'tools']; 
    for (const sec of sectionOrder) {
        if (!groups[sec]) continue;
        html += '<div class="config-section">';
        html += '<div class="config-section-title">' + (sectionLabels[sec] || sec) + '</div>';
        for (const e of groups[sec]) {
            const isSecret = e.secret;
            const hasValue = !!(e.value && e.value !== '');
            const inputId = 'cfg_' + e.key;

            html += '<div class="config-field">';
            html += '<label for="' + inputId + '">';
            html += esc(e.label) + (e.description ? '<small>' + esc(e.description) + '</small>' : '');
            if (e.required) html += ' <span style="color:#f87171">*</span>';
            html += '</label>';

            if (e.type === 'select' && e.options && e.options.length > 0) {
                html += '<select id="' + inputId + '">';
                for (const opt of e.options) {
                    const sel = (e.value || '') === opt ? ' selected' : '';
                    html += '<option value="' + esc(opt) + '"' + sel + '>' + esc(opt) + '</option>';
                }
                html += '</select>';
            } else if (e.type === 'button') {
                html += '<button class="config-update-btn" id="' + inputId + '" data-action="update-ytdlp">⬇️ ' + esc(e.label) + '</button>';
            } else if (isSecret) {
                // Secret-Feld: immer password, nie vorbelegen (Sicherheit)
                const status = hasValue ? '<span style="color:#4ade80;font-size:0.75rem;margin-left:0.4rem;">✓ gesetzt</span>' : '';
                html += '<div style="display:flex;align-items:center;gap:0.4rem;">';
                html += '<input id="' + inputId + '" type="password" placeholder="(leer = unverändert)" data-key="' + esc(e.key) + '" data-secret="true" />';;
                html += status;
                html += '</div>';
            } else {
                const type = e.type === 'number' ? 'number' : 'text';
                // SUMMARY_MAX_TOKENS: Zeilenweise Token + direkte Zeichen-Angabe
                if (e.key === 'SUMMARY_MAX_TOKENS') {
                    const tokens = parseInt(e.value || '64000', 10);
                    const chars = Math.round(tokens * 3.5);
                    html += '<input id="' + inputId + '" type="number" min="1" step="1" value="' + (isNaN(tokens) ? '' : tokens) + '" data-key="SUMMARY_MAX_TOKENS" data-secret="false" />';
                    html += '<div class="token-hint" id="cfg_' + inputId + '_hint">≈ ' + chars.toLocaleString('de-DE') + ' Zeichen</div>';
                } else {
                    html += '<input id="' + inputId + '" type="' + type + '" value="' + esc(e.value || '') + '" data-key="' + esc(e.key) + '" data-secret="false" />';
                }
            }
            html += '</div>';
        }
        html += '</div>';
    }

    configBody.innerHTML = html;

    // Live-Zeichen-Berechnung für SUMMARY_MAX_TOKENS
    const tokenInput = document.getElementById('cfg_SUMMARY_MAX_TOKENS');
    const tokenHint = document.getElementById('cfg_cfg_SUMMARY_MAX_TOKENS_hint');
    if (tokenInput && tokenHint) {
        tokenInput.addEventListener('input', () => {
            const tokens = parseInt(tokenInput.value, 10);
            if (!isNaN(tokens) && tokens > 0) {
                const chars = Math.round(tokens * 3.5);
                tokenHint.textContent = '≈ ' + chars.toLocaleString('de-DE') + ' Zeichen';
            } else {
                tokenHint.textContent = '';
            }
        });
    }
}

async function saveConfig() {
    if (!configData) return;
    const values = {};
    for (const entry of configData.configured) {
        const el = document.getElementById('cfg_' + entry.key);
        if (!el) continue;
        const val = el.value || '';
        // Leer lassen = unverändert (wird vom Backend beibehalten)
        if (val !== '') values[entry.key] = val;
    }

    configSaveBtn.textContent = '⏳ Wird gespeichert...';
    configSaveBtn.disabled = true;

    try {
        const r = await fetch('/api/config', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ envFile: configData.envFile, values })
        });
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const resp = await r.json();
        toast(resp.note || 'Gespeichert!');
    } catch (e) {
        toast('Fehler: ' + e.message);
    } finally {
        configSaveBtn.textContent = '💾 Speichern';
        configSaveBtn.disabled = false;
    }
}

if (menuConfig) menuConfig.addEventListener('click', openConfig);
if (configClose) configClose.addEventListener('click', closeConfig);
if (configSaveBtn) configSaveBtn.addEventListener('click', saveConfig);
if (configOverlay) {
    configOverlay.addEventListener('click', (e) => {
        if (e.target === configOverlay) closeConfig();
    });

    // Config action buttons (e.g. update yt-dlp)
    document.querySelectorAll('.config-update-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
            const action = btn.dataset.action;
            if (action === 'update-ytdlp') {
                btn.textContent = '⏳ Downloading...';
                btn.disabled = true;
                try {
                    const r = await fetch('/api/update-ytdlp', { method: 'POST' });
                    const data = await r.json();
                    if (data.ok === 'true') {
                        showToast('✅ yt-dlp updated');
                    } else {
                        showToast('❌ ' + (data.error || 'update failed'));
                    }
                } catch (e) {
                    showToast('❌ ' + e.message);
                } finally {
                    btn.textContent = '⬇️ yt-dlp aktualisieren';
                    btn.disabled = false;
                }
            }
        });
    });
}

let searchDebounce;
const searchClearBtn = document.getElementById('searchClearBtn');

searchInput.addEventListener('input', () => {
    const q = searchInput.value.trim();
    // Clear-Button Sichtbarkeit
    if (searchClearBtn) searchClearBtn.classList.toggle('visible', q.length > 0);

    // Mobile: erst ab 4 Zeichen suchen
    const isMobile = window.matchMedia('(max-width: 600px)').matches;
    if (isMobile && q.length > 0 && q.length < 4) {
        return; // Zu kurz, noch nicht suchen
    }

    clearTimeout(searchDebounce);
    searchDebounce = setTimeout(load, 300);
});

    });

            await fetch('/api/language', {

// ── Theme Management ────────────────────────────────────
function setTheme(theme) {
    if (theme !== 'light' && theme !== 'dark') {
        theme = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
    }
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('foundaition-theme', theme);
    const btn = document.getElementById('themeToggle');
    if (btn) {
        btn.innerHTML = theme === 'dark'
            ? '🌙 <span data-i18n="theme_dark">' + __('theme_dark') + '</span> / ☀️ <span data-i18n="theme_light">' + __('theme_light') + '</span>'
            : '☀️ <span data-i18n="theme_light">' + __('theme_light') + '</span> / 🌙 <span data-i18n="theme_dark">' + __('theme_dark') + '</span>';
    }
}

document.getElementById('themeToggle')?.addEventListener('click', () => {
    const current = document.documentElement.getAttribute('data-theme') || 'dark';
    setTheme(current === 'dark' ? 'light' : 'dark');
});

// ── Init ──────────────────────────────────────────────────
(async function init() {
    // Load language setting
    try {
        const r = await fetch('/api/language');
        if (r.ok) {
            const data = await r.json();
            setLanguage(data.language || 'de');
        }
    } catch(e) { /* use default */ }

    // Load theme preference
    const saved = localStorage.getItem('foundaition-theme');
    if (saved) {
        setTheme(saved);
    } else if (window.matchMedia('(prefers-color-scheme: light)').matches) {
        setTheme('light');
    } else {
        setTheme('dark');
    }

    load();
    checkRoute();
})();
